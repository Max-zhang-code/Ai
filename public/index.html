<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Max Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-elevated: #0f172a;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.15);
        --border-subtle: rgba(148, 163, 184, 0.35);
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --danger: #f97373;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: stretch;
        background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'SF Pro Text',
          'Segoe UI',
          sans-serif;
        color: var(--text-main);
      }

      .app {
        flex: 1;
        max-width: 960px;
        display: flex;
        flex-direction: column;
        margin: 16px;
        border-radius: 18px;
        background: linear-gradient(
          145deg,
          rgba(15, 23, 42, 0.96),
          rgba(15, 23, 42, 0.9)
        );
        box-shadow:
          0 32px 80px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(148, 163, 184, 0.25);
        overflow: hidden;
      }

      .app-header {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-subtle);
        backdrop-filter: blur(18px);
        background: linear-gradient(
          120deg,
          rgba(15, 23, 42, 0.98),
          rgba(15, 23, 42, 0.95)
        );
      }

      .title-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-dot {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: radial-gradient(
          circle at 30% 30%,
          #e0f2fe 0,
          #38bdf8 35%,
          #0ea5e9 100%
        );
        box-shadow:
          0 0 30px rgba(56, 189, 248, 0.9),
          0 0 0 1px rgba(56, 189, 248, 0.6);
      }

      .title-text-main {
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .title-text-sub {
        font-size: 12px;
        color: var(--text-muted);
      }

      .header-badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.5);
        background: radial-gradient(
          circle at top left,
          rgba(56, 189, 248, 0.35),
          transparent
        );
        color: #e0f2fe;
      }

      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 16px 8px;
        gap: 10px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding-right: 4px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .message-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-bubble {
        max-width: 78%;
        padding: 9px 11px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.5;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: radial-gradient(
          circle at top left,
          rgba(15, 23, 42, 0.9),
          #020617
        );
        color: var(--text-main);
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: break-word;
        position: relative;
        max-height: 300px;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .message-bubble::-webkit-scrollbar {
        width: 6px;
      }

      .message-bubble::-webkit-scrollbar-track {
        background: rgba(148, 163, 184, 0.1);
        border-radius: 3px;
      }

      .message-bubble::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.3);
        border-radius: 3px;
      }

      .message-bubble::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.5);
      }

      .message-bubble:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn {
        position: absolute;
        top: -8px;
        right: -8px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ef4444;
        color: white;
        border: none;
        font-size: 12px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .delete-btn:hover {
        background: #dc2626;
        transform: scale(1.1);
      }

      .message-bubble.user {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        border-color: rgba(59, 130, 246, 0.9);
        color: #ffffff;
      }

      .message-bubble.user .message-meta {
        color: rgba(255, 255, 255, 0.95);
        font-weight: 600;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }

      .message-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .avatar {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: radial-gradient(
          circle at 30% 30%,
          #e0f2fe 0,
          #38bdf8 35%,
          #0ea5e9 100%
        );
        box-shadow: 0 0 12px rgba(56, 189, 248, 0.7);
        flex-shrink: 0;
      }

      .avatar.user {
        background: linear-gradient(
          135deg,
          #d97706 0%,
          #f59e0b 50%,
          #d97706 100%
        );
        box-shadow: 0 0 12px rgba(245, 158, 11, 0.6);
        border: 2px solid rgba(251, 191, 36, 0.9);
        color: #ffffff;
        font-size: 11px;
        font-weight: 700;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      }

      .typing {
        display: inline-flex;
        gap: 4px;
      }

      .dot {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.9);
        animation: blink 1.4s infinite both;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes blink {
        0% {
          opacity: 0.25;
          transform: translateY(0);
        }
        20% {
          opacity: 1;
          transform: translateY(-1px);
        }
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
      }

      .input-area {
        border-top: 1px solid var(--border-subtle);
        padding: 8px 10px 10px;
        display: flex;
        gap: 8px;
        align-items: flex-end;
        background: linear-gradient(
          180deg,
          rgba(15, 23, 42, 0.98),
          rgba(15, 23, 42, 1)
        );
      }

      .input-box {
        flex: 1;
        padding: 8px 10px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        background-color: rgba(15, 23, 42, 0.9);
        color: var(--text-main);
        resize: none;
        max-height: 120px;
        min-height: 38px;
        font-size: 14px;
        line-height: 1.5;
      }

      .input-box:focus {
        outline: none;
        border-color: rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.5);
      }

      .send-btn {
        border: none;
        border-radius: 999px;
        padding: 0 14px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        background: linear-gradient(135deg, #0ea5e9, #38bdf8);
        color: #0b1120;
        box-shadow:
          0 12px 30px rgba(56, 189, 248, 0.55),
          0 0 0 1px rgba(56, 189, 248, 0.7);
        flex-shrink: 0;
      }

      .send-btn:disabled {
        opacity: 0.55;
        cursor: default;
        box-shadow: none;
      }

      .send-icon {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 1.5px solid currentColor;
        border-bottom-color: transparent;
        border-left-color: transparent;
        transform: rotate(45deg);
      }

      .error-banner {
        font-size: 12px;
        color: var(--danger);
        margin-top: 4px;
      }

      @media (max-width: 640px) {
        .app {
          margin: 0;
          border-radius: 0;
        }

        .message-bubble {
          max-width: 86%;
        }

        .app-header {
          padding-inline: 12px;
        }

        .input-area {
          padding-inline: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="title-group">
          <div class="logo-dot"></div>
          <div>
            <div class="title-text-main">Max Chat</div>
            <div class="title-text-sub">
              纯HTML/CSS/JS前端 + Node.js/Express后端 · gpt-oss:120b-cloud模型
            </div>
          </div>
        </div>
        <div style="display: flex; gap: 8px; align-items: center">
          <button
            id="clearBtn"
            style="
              padding: 4px 10px;
              border: 1px solid rgba(56, 189, 248, 0.5);
              border-radius: 6px;
              background: transparent;
              color: #e0f2fe;
              font-size: 12px;
              cursor: pointer;
              transition: all 0.2s;
            "
            onmouseover="this.style.background = 'rgba(56, 189, 248, 0.2)'"
            onmouseout="this.style.background = 'transparent'"
          >
            清空记录
          </button>
          <div class="header-badge">120B云端模型 · Ollama驱动</div>
        </div>
      </header>
      <main class="chat-main">
        <div id="messages" class="messages"></div>
        <div id="error" class="error-banner" style="display: none"></div>
      </main>
      <div class="input-area">
        <textarea
          id="input"
          class="input-box"
          placeholder="问点什么吧，支持连续对话。按 Enter 发送，Shift+Enter 换行。"
        ></textarea>
        <button id="send" class="send-btn">
          <span>发送</span>
          <span class="send-icon"></span>
        </button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendBtn = document.getElementById('send');
      const errorEl = document.getElementById('error');

      // 从 localStorage 加载聊天记录
      function loadHistory() {
        const saved = localStorage.getItem('maxChatHistory');
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error('加载聊天记录失败:', e);
          }
        }
        return [
          {
            role: 'system',
            content:
              '你是一个聪明、幽默的前端+Node.js全栈工程师，帮用户解决问题，用中文回复。',
          },
        ];
      }

      // 保存聊天记录到 localStorage
      function saveHistory() {
        localStorage.setItem('maxChatHistory', JSON.stringify(history));
      }

      // 清空聊天记录
      function clearHistory() {
        history = [
          {
            role: 'system',
            content:
              '你是一个聪明、幽默的前端+Node.js全栈工程师，帮用户解决问题，用中文回复。',
          },
        ];
        saveHistory();
        renderMessages(false);
      }

      // 删除单条消息
      function deleteMessage(index) {
        if (confirm('确定要删除这条消息吗？')) {
          history.splice(index, 1);
          saveHistory();
          renderMessages(false);
        }
      }

      let history = loadHistory();

      let isSending = false;

      function renderMessages(showTyping) {
        messagesEl.innerHTML = '';

        history.forEach((msg, index) => {
          if (msg.role === 'system') return;

          const row = document.createElement('div');
          row.className =
            'message-row ' + (msg.role === 'user' ? 'user' : 'assistant');

          const avatar = document.createElement('div');
          avatar.className =
            'avatar ' + (msg.role === 'user' ? 'user' : 'assistant');
          avatar.textContent = msg.role === 'user' ? '我' : 'AI';
          avatar.style.display = 'flex';
          avatar.style.alignItems = 'center';
          avatar.style.justifyContent = 'center';
          avatar.style.fontSize = '10px';
          avatar.style.fontWeight = 'bold';
          avatar.style.color = '#fff';

          const bubble = document.createElement('div');
          bubble.className =
            'message-bubble ' + (msg.role === 'user' ? 'user' : 'assistant');

          const meta = document.createElement('div');
          meta.className = 'message-meta';
          meta.textContent = msg.role === 'user' ? '你' : 'AI';

          const content = document.createElement('div');
          content.textContent = msg.content;

          // 添加删除按钮
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.innerHTML = '×';
          deleteBtn.title = '删除这条消息';
          deleteBtn.onclick = () => deleteMessage(index);

          bubble.appendChild(meta);
          bubble.appendChild(content);
          bubble.appendChild(deleteBtn);

          if (msg.role === 'user') {
            row.appendChild(bubble);
            row.appendChild(avatar);
          } else {
            row.appendChild(avatar);
            row.appendChild(bubble);
          }

          messagesEl.appendChild(row);
        });

        if (showTyping) {
          const row = document.createElement('div');
          row.className = 'message-row assistant';

          const avatar = document.createElement('div');
          avatar.className = 'avatar assistant';
          avatar.textContent = 'AI';
          avatar.style.display = 'flex';
          avatar.style.alignItems = 'center';
          avatar.style.justifyContent = 'center';
          avatar.style.fontSize = '10px';
          avatar.style.fontWeight = 'bold';
          avatar.style.color = '#fff';

          const bubble = document.createElement('div');
          bubble.className = 'message-bubble assistant';

          const meta = document.createElement('div');
          meta.className = 'message-meta';
          meta.textContent = 'AI 正在思考…';

          const typing = document.createElement('div');
          typing.className = 'typing';

          for (let i = 0; i < 3; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            typing.appendChild(dot);
          }

          bubble.appendChild(meta);
          bubble.appendChild(typing);

          row.appendChild(avatar);
          row.appendChild(bubble);

          messagesEl.appendChild(row);
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isSending) return;

        errorEl.style.display = 'none';
        errorEl.textContent = '';

        // 先渲染用户消息（不添加到 history，让后端处理）
        const userMessage = { role: 'user', content: text };
        const tempHistory = [...history, userMessage];
        inputEl.value = '';

        isSending = true;
        sendBtn.disabled = true;

        // 使用临时 history 渲染，包含用户消息
        const originalHistory = history;
        history = tempHistory;
        renderMessages(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: originalHistory }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data?.error || 'Request failed');
          }

          if (data.history) {
            history = data.history;
          } else if (data.reply) {
            history.push({ role: 'assistant', content: data.reply });
          }

          // 保存聊天记录
          saveHistory();

          renderMessages(false);
        } catch (err) {
          console.error(err);
          errorEl.style.display = 'block';
          errorEl.textContent =
            '调用 AI 失败：' +
            (err && err.message ? err.message : 'Unknown error');
          renderMessages(false);
        } finally {
          isSending = false;
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener('click', sendMessage);

      // 清空记录按钮
      document.getElementById('clearBtn').addEventListener('click', () => {
        if (confirm('确定要清空所有聊天记录吗？')) {
          clearHistory();
        }
      });

      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // 初始渲染（加载保存的记录）
      renderMessages(false);
      inputEl.focus();
    </script>
  </body>
</html>
